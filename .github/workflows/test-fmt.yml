name: fmt

on:
  pull_request:
  push:
    branches: [main]

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install formatters
        run: |
          npm install -g prettier
          go install mvdan.cc/gofumpt@latest
          go install github.com/daixiang0/gci@latest
      - name: Install treefmt
        if: hashFiles('treefmt.toml') != ''
        run: |
          set -euo pipefail
          version="$(curl -fsSL https://api.github.com/repos/numtide/treefmt/releases/latest | jq -r .tag_name)"
          version="${version#v}"
          tmpdir="$(mktemp -d)"
          curl -fsSL "https://github.com/numtide/treefmt/releases/download/v${version}/treefmt_${version}_linux_amd64.tar.gz" \
            | tar -xz -C "$tmpdir"
          sudo install -m 0755 "$tmpdir/treefmt" /usr/local/bin/treefmt
          treefmt --version
      - name: Check format
        run: |
          if [ -f treefmt.toml ]; then
            treefmt --fail-on-change --allow-missing-formatter
          else
            echo "treefmt.toml not found; skipping treefmt check"
          fi
