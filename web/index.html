<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>matplotlib-go Web Demo</title>
    <script>
      (() => {
        try {
          const modes = ["auto", "light", "dark"];
          const storedMode = localStorage.getItem("matplotlib-go-theme");
          const mode = modes.includes(storedMode) ? storedMode : "auto";
          const isDark =
            mode === "dark" ||
            (mode === "auto" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.themeMode = mode;
          if (isDark) {
            document.documentElement.dataset.theme = "dark";
          }
        } catch {
          document.documentElement.dataset.themeMode = "auto";
        }
      })();
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <div class="hero-content">
          <p class="eyebrow">WASM Demo</p>
          <h1>matplotlib-go in the browser</h1>
          <p class="hero-copy">
            Figures are rendered by Go code compiled to WebAssembly and painted
            into an HTML canvas via a small JavaScript bridge.
          </p>
        </div>
        <button
          id="themeToggle"
          class="theme-toggle"
          type="button"
          aria-label="Toggle theme"
        >
          <svg
            class="theme-toggle-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="4" width="18" height="12" rx="2"></rect>
            <path d="M8 20h8"></path>
            <path d="M12 16v4"></path>
          </svg>
          <span class="theme-toggle-label">Auto</span>
        </button>
      </section>

      <section class="workspace">
        <aside class="controls-panel">
          <label class="field-label" for="demoSelector">Demo</label>
          <select id="demoSelector"></select>
          <label class="field-label stacked-field-label" for="backendSelector">
            Backend
          </label>
          <select id="backendSelector"></select>
          <button
            id="downloadBtn"
            class="secondary-button"
            type="button"
            disabled
          >
            Download PNG
          </button>
          <button
            id="sourceBtn"
            class="secondary-button"
            type="button"
            aria-controls="sourcePanel"
            aria-expanded="false"
            disabled
          >
            View code
          </button>

          <div class="meta-block">
            <h2 id="demoTitle">Loading…</h2>
            <p id="demoDescription">Preparing the WASM runtime.</p>
          </div>

          <div class="status-block">
            <span class="status-label">Status</span>
            <span id="statusMsg">Loading WASM…</span>
          </div>
        </aside>

        <section class="canvas-panel">
          <div class="canvas-frame">
            <canvas
              id="plotCanvas"
              width="960"
              height="540"
              aria-label="matplotlib-go rendered plot"
            ></canvas>
          </div>
        </section>
      </section>

      <section
        id="sourcePanel"
        class="source-panel"
        aria-labelledby="sourceTitle"
        hidden
      >
        <div class="source-panel-header">
          <h2 id="sourceTitle">Demo code</h2>
          <button
            id="closeSourceBtn"
            class="secondary-button compact-button"
            type="button"
          >
            Close
          </button>
        </div>
        <pre><code id="sourceCode"></code></pre>
      </section>
    </main>

    <script src="wasm_exec.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
